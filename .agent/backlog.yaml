version: 1
last_updated: 2026-03-21
principle: Build the ontology in dependency order and do not skip prerequisites.
items:
  - id: phase-0-memory-bootstrap
    phase: 0
    priority: P0
    status: done
    title: Bootstrap committed execution memory under .agent/
    depends_on: []
    deliverables:
      - .agent/mission.md
      - .agent/backlog.yaml
      - .agent/iterations/
      - .agent/decisions.md
      - .agent/ontology-status.yaml
      - .agent/coverage-matrix.yaml
      - .agent/repo-map.md
      - .agent/glossary.md

  - id: phase-1-foundations-and-schema
    phase: 1
    priority: P0
    status: done
    title: Create foundational docs and canonical schema
    depends_on:
      - phase-0-memory-bootstrap
    deliverables:
      - docs/ontology.md
      - docs/schema.md
      - docs/index-tree.md
      - docs/contribution-guide.md
      - schema/pattern.schema.json
    notes:
      - Establish field definitions before any vocabulary or pattern authoring.
      - Keep the schema aligned with the pattern-first mission in README.md.

  - id: phase-2-controlled-vocabularies
    phase: 2
    priority: P0
    status: done
    title: Define controlled vocabularies for the ontology core
    depends_on:
      - phase-1-foundations-and-schema
    deliverables:
      - data/vocabularies/problem-structures.yaml
      - data/vocabularies/domains.yaml
      - data/vocabularies/architectures.yaml
      - data/vocabularies/capabilities.yaml
      - data/vocabularies/autonomy-levels.yaml
      - data/vocabularies/risk-levels.yaml

  - id: phase-3-navigation-views
    phase: 3
    priority: P1
    status: done
    title: Create pattern-first navigation views
    depends_on:
      - phase-2-controlled-vocabularies
    deliverables:
      - data/views/index-tree.yaml
      - data/views/by-domain.yaml
      - data/views/by-architecture.yaml
      - data/views/by-autonomy.yaml
      - data/views/by-risk.yaml

  - id: phase-4-pattern-family-docs
    phase: 4
    priority: P1
    status: done
    title: Define top-level pattern family documentation
    depends_on:
      - phase-3-navigation-views
    deliverables:
      - docs/patterns/
    notes:
      - Start with the seed families named in the orchestration prompt.
      - Use the new browse views as the canonical family order and linkage baseline for family doc authoring.

  - id: phase-5-seed-patterns
    phase: 5
    priority: P1
    status: done
    title: Author first canonical YAML pattern entries
    depends_on:
      - phase-4-pattern-family-docs
    deliverables:
      - data/patterns/
    notes:
      - Begin with high-value seed patterns only after schema, vocabularies, and views exist.
      - Use the Phase 4 family docs as narrative anchors so seed patterns stay within stable family boundaries.
      - The first batch covered gather/synthesize, investigate/verify, and monitor/triage with browse-view linkage already in place.
      - The second batch now adds first canonical entries in `plan-coordinate-schedule`, `recommend-decide-escalate`, and `execute-automate` while covering the low-risk, critical-risk, and `approval-gated-execution` architecture gaps.
      - A follow-on batch now adds the first `optimize-adapt` pattern, leaving `human-agent-collaborative-work` as the only empty family that already has a direct problem-structure vocabulary mapping.
      - The new `analyst-copilot-loop` anchor now covers `human-agent-collaborative-work`, leaving `transform-process` as the only still-empty top-level family.
      - "The `structured-representation-transformation` vocabulary term now closes the family-mapping gap for `transform-process`."
      - "`document-to-structured-data-handoff` now provides first canonical seed coverage for `transform-process`, so Phase 5 has at least one representative pattern in every top-level family."

  - id: phase-6-grounded-instances
    phase: 6
    priority: P2
    status: done
    title: Add Markdown instances linked to mature patterns
    depends_on:
      - phase-5-seed-patterns
    deliverables:
      - instances/
    notes:
      - The first three grounded examples now exist for research, engineering, and finance, each tied directly to one of the initial canonical patterns.
      - A follow-on instance batch now grounds the planning, recommendation, and execution patterns in operations, compliance, and HR scenarios.
      - "Support is now grounded through a collaboration-oriented escalation example linked to `analyst-copilot-loop`, so every currently modeled domain has at least one instance."
      - "`transform-process` is now grounded through a finance AP handoff example linked to `document-to-structured-data-handoff`."
      - "`transform-process` now has additional compliance and operations grounding through pharmacovigilance safety-case intake and facilities corrective-maintenance handoff examples."
      - "`optimize-adapt` is now grounded through a support queue reprioritization example linked to `queue-prioritization-optimization`."
      - "`optimize-adapt` now has a governed compliance grounding example through a regulatory consumer-complaint response queue reprioritization scenario, so the family is covered across support, operations, and compliance."
      - "`recommend-decide-escalate` now has a second grounded finance example and `execute-automate` now has a second grounded compliance example, but both families still have many partial domain slices."
      - "`recommend-decide-escalate` is now grounded across finance, compliance, and operations after adding a multi-site service-package feasibility recommendation example."
      - "`recommend-decide-escalate` is now also grounded in support through a severity-one service-credit and recovery-package recommendation scenario, so the family now spans finance, compliance, operations, and support."
      - "`recommend-decide-escalate` is now also grounded in HR through an international relocation and sign-on package recommendation scenario, so the family now spans finance, compliance, operations, support, and HR."
      - "`human-agent-collaborative-work` now has grounded support, research, and compliance examples after adding a regulator-response copilot loop for sanctions-alert closure review."
      - "`monitor-detect-triage` is now grounded in finance, compliance, and operations after adding pharmacovigilance safety-signal and cold-chain excursion triage examples."
      - "`investigate-reconcile-verify` is now grounded in engineering, finance, and compliance after adding treasury cash-position discrepancy and sanctions-screening-gap root-cause investigation examples."
      - "`gather-retrieve-synthesize` is now grounded in every currently modeled domain after adding compliance, HR, and engineering synthesis examples alongside the earlier research, finance, operations, and support anchors."
      - "`human-agent-collaborative-work` is now grounded across support, research, compliance, and engineering after adding a deprecated message-broker client migration exception copilot loop."
      - "`human-agent-collaborative-work` is now also grounded in operations through a supplier labeling deviation remediation brief copilot loop, so the family now spans support, research, compliance, engineering, and operations."
      - "`human-agent-collaborative-work` is now also grounded in finance through a quarter-close covenant clarification package copilot loop, so the family now spans support, research, compliance, engineering, operations, and finance."
      - "`monitor-detect-triage` is now grounded in support through a suspected account takeover alert triage scenario, so the family now has representative monitoring coverage across finance, compliance, operations, and support."
      - "`monitor-detect-triage` is now also grounded in engineering through a production release regression alert triage scenario, extending the family into a domain that already had adjacent investigation, synthesis, and collaboration coverage."
      - "`investigate-reconcile-verify` is now grounded in operations through a distribution-sorter misroute root-cause investigation scenario, so the family now spans engineering, finance, compliance, and operations."
      - "`investigate-reconcile-verify` is now also grounded in support through an enterprise admin entitlement drift root-cause investigation scenario, so the family now spans engineering, finance, compliance, operations, and support."
      - "`human-agent-collaborative-work` is now grounded across support, research, compliance, engineering, operations, finance, and HR after adding a workplace accommodation exception memo copilot loop."
      - "`transform-process` is now also grounded in HR through a medical leave certification packet to leave-case record handoff, so the family now spans finance, compliance, operations, support, and HR."
      - "`transform-process` is now also grounded in research through a benchmark study artifact packet to research review intake record handoff, so the family now spans finance, compliance, operations, support, HR, and research."
      - "`transform-process` is now grounded across all seven currently modeled domains after adding an engineering release-candidate evidence packet to deployment-review staging record handoff."
      - "`plan-coordinate-schedule` is now also grounded in engineering through a cross-team release-readiness review scheduling scenario, so the family now spans engineering, operations, support, and HR."
      - "`plan-coordinate-schedule` is now also grounded in finance through a quarter-close control review scheduling scenario, so the family now spans engineering, finance, operations, support, and HR."
      - "`plan-coordinate-schedule` is now also grounded in research through a benchmark-study publication-readiness review scheduling scenario, so the family now spans engineering, finance, operations, research, support, and HR."
      - "`plan-coordinate-schedule` is now grounded across all seven currently modeled domains after adding a control-remediation sign-off review scheduling scenario."
      - "`execute-automate` is now also grounded in research through an approved human-subjects ethics amendment portal submission, so the family now spans finance, compliance, HR, operations, research, and support while leaving engineering as the only open domain slice."
      - "`execute-automate` is now grounded across all seven currently modeled domains after adding an engineering production change-freeze exception portal submission."
      - "`recommend-decide-escalate` is now grounded across engineering, finance, compliance, operations, support, and HR after adding a managed-database major-version upgrade exception recommendation scenario, leaving research as the remaining open domain slice in that family."
      - "`recommend-decide-escalate` is now grounded across all seven currently modeled domains after adding a benchmark-study publication go/no-go recommendation scenario in research."
      - Phase 6 now has at least one grounded instance in every family and every currently modeled domain, so broader balancing work can move into Phase 7 coverage refinement.

  - id: phase-7-coverage-refinement
    phase: 7
    priority: P2
    status: in_progress
    title: Expand weak combinations in the coverage matrix
    depends_on:
      - phase-6-grounded-instances
    deliverables:
      - Balanced coverage across families, domains, architectures, and governance profiles
    notes:
      - The last empty family gap is closed at the canonical pattern layer and `transform-process` now has its first grounded example.
      - Next refinement work should rebalance partial coverage across lightly grounded families and underrepresented architecture or risk combinations.
      - "`approval-packet-generation` now gives `gather-retrieve-synthesize` a second canonical pattern plus representative `orchestrated-multi-agent` and `high` risk coverage without crossing into recommendation or execution."
      - "`optimize-adapt` is now grounded across engineering, finance, compliance, operations, research, support, and HR after adding an engineering CI pipeline failure review queue reprioritization example."
      - "`investigate-reconcile-verify` is now grounded across engineering, finance, compliance, operations, support, research, and HR after adding a protected-leave return-to-work status drift root-cause investigation example."
      - "`monitor-detect-triage` is now grounded across engineering, finance, compliance, operations, research, support, and HR after adding a benchmark-study disclosure risk alert triage example, so all nine top-level families are now grounded across all seven currently modeled domains."
      - "`critical-signal-corroboration-triage` now gives `monitor-detect-triage` a second canonical pattern plus representative `critical` risk and `orchestrated-multi-agent` coverage while keeping the family bounded at corroboration, prioritization, and governed routing."
      - "`policy-constrained-escalation-routing` now gives `recommend-decide-escalate` a second canonical pattern plus representative `orchestrated-multi-agent` coverage while keeping the family bounded at governed route recommendation and escalation packaging."
      - "`normalization-and-enrichment` now gives `transform-process` a second canonical pattern plus representative `low` risk coverage while keeping the family bounded at reversible normalization, approved enrichment, and downstream-safe staging."
      - "`exception-aware-task-execution` now gives `execute-automate` a second canonical pattern plus representative `moderate` risk, `bounded-delegation`, and `orchestrated-multi-agent` coverage while keeping the family bounded at resilient routine completion, bounded retries, and exception-driven escalation."
      - "`authoritative-record-reconciliation` now gives `investigate-reconcile-verify` a second canonical pattern plus representative `record-reconciliation`, `tool-using-single-agent`, `bounded-delegation`, and `moderate` risk coverage while staying bounded at authoritative-state restoration and correction packaging rather than root-cause diagnosis or downstream business action."
      - "`approval-centered-collaboration` now gives `human-agent-collaborative-work` a second canonical pattern plus representative `orchestrated-multi-agent`, `recommendation-only`, and `high` risk coverage while staying bounded at review-cycle collaboration and explicit approval ownership rather than decision adjudication or execution."
      - "`change-triggered-context-briefing` now gives `gather-retrieve-synthesize` a third canonical pattern plus representative `low` risk, `event-driven-monitoring`, and `bounded-delegation` coverage while staying bounded at contextual revision digests rather than alert triage, open-ended research, or downstream action."
      - "`anomaly-detection-review` now gives `monitor-detect-triage` a third canonical pattern plus representative `moderate` risk, `tool-using-single-agent`, and `bounded-delegation` coverage while staying bounded at explainable anomaly packet assembly and governed routing rather than critical corroboration, investigation, or execution."
      - "`explainable-watchlist-maintenance` now gives `monitor-detect-triage` a fourth canonical pattern plus representative `low` risk and `exception-gated-autonomy` coverage while staying bounded at explainable watchlisting, bounded noise suppression, and routine attention routing rather than anomaly review, recommendation, investigation, or execution."
      - "`claimed-state-verification` now gives `investigate-reconcile-verify` a third canonical pattern plus representative `evidence-backed-verification`, `low` risk, and `event-driven-monitoring` coverage while staying bounded at confirming or disproving low-stakes claimed states rather than repairing records, diagnosing causes, or propagating downstream completion."
      - "`shared-workbench-orchestration` now gives `human-agent-collaborative-work` a third canonical pattern plus representative `low` risk, `bounded-delegation`, and `event-driven-monitoring` coverage while staying bounded at internal workbench upkeep rather than synthesis-only drafting, approval readiness, or downstream execution."
      - "`batch-content-transformation` now gives `transform-process` a third canonical pattern plus representative `high` risk, `approval-gated`, `orchestrated-multi-agent`, and `human-in-the-loop` coverage while staying bounded at reviewed release-safe representations rather than downstream publication or action."
      - "`governed-optimization-bundle-retuning` now gives `optimize-adapt` a third canonical pattern plus representative `orchestrated-multi-agent`, `recommendation-only`, and `high` risk coverage while staying bounded at governed shared-state retuning and human-adopted bundle updates rather than direct queue scoring, decision adjudication, or downstream execution."
      - "`staged-change-execution-with-rollback-holds` now gives `execute-automate` a fourth canonical pattern plus representative `high` risk and `exception-gated-autonomy` coverage while staying bounded at staged live-state progression, rollback-aware hold points, and human-visible intervention rather than browser submission, routine delegated execution, or low-risk closure."
      - "`critical-command-window-resequencing` now gives `plan-coordinate-schedule` a fourth canonical pattern plus representative `critical` risk, `orchestrated-multi-agent`, `human-in-the-loop`, and `human-directed` coverage while staying bounded at checkpoint resequencing, explicit holds, and command-window coordination packets rather than triage, recommendation, or execution."
      - "`plan-coordinate-schedule` now spans low-, moderate-, high-, and critical-risk slices after adding `critical-command-window-resequencing` plus engineering, finance, and operations command-window examples alongside the earlier scheduling, replanning, and coordination-refresh anchors."
      - "With `plan-coordinate-schedule` now joining the families that span all four tracked risk levels, the next refinement step should likely target another narrow family-specific `critical` gap such as `recommend-decide-escalate`, `optimize-adapt`, or `human-agent-collaborative-work` rather than reopen broad domain expansion."
