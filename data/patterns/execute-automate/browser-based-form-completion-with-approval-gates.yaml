  - domain:
      id: finance
      label: Finance
      source_vocabulary: domains
    example: Submit a vendor banking update through a browser-only finance portal after dual approval and evidence capture.
  - domain:
      id: compliance
      label: Compliance
      source_vocabulary: domains
    example: File a regulated disclosure update through a portal that requires documented review before final submission.
  - domain:
      id: hr
      label: HR
      source_vocabulary: domains
    example: Complete a sensitive employee status or payroll change in a browser workflow only after required manager and payroll approvals.
