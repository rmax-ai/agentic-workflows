  - domain:
      id: finance
      label: Finance
      source_vocabulary: domains
    example: Treasury and finance controllers co-produce one liquidity or covenant review packet, then release that revision into one committee lane while funding or accounting decisions remain downstream.
  - domain:
      id: compliance
      label: Compliance
      source_vocabulary: domains
    example: Compliance and legal reviewers maintain one remediation or regulator-preparation artifact, then a named human owner approves its handoff into one bounded legal or oversight lane without triggering outreach or execution.
  - domain:
      id: research
      label: Research
      source_vocabulary: domains
    example: Research, reproducibility, and publication reviewers co-produce one benchmark claim-clarification packet, then a named human owner approves that exact revision for one publication-integrity intake lane without deciding publication or releasing the study externally.
  - domain:
      id: support
      label: Support
      source_vocabulary: domains
    example: Support, incident, and customer-review stakeholders collaborate on one outage disclosure packet, then release that exact revision into one executive customer-review lane while customer communication and remediation remain downstream.
  - domain:
      id: hr
      label: HR
      source_vocabulary: domains
    example: Leave, employee-relations, and occupational-health reviewers maintain one protected leave return-to-work exception packet, then a named human owner approves its handoff into one bounded review lane without deciding the leave outcome or updating payroll.
