id: approval-gated-collaborative-artifact-release
slug: approval-gated-collaborative-artifact-release
name: Approval-gated collaborative artifact release
summary: Co-produce one governed shared artifact and release that exact artifact into one bounded downstream review lane only after explicit human approval, preserving disagreement, ownership, and release boundaries without drifting into recommendation adjudication, representation transformation, or live execution.
pattern_family:
  id: human-agent-collaborative-work
  label: Human-agent collaborative work
problem_structure:
  id: human-agent-collaboration
  label: Human-agent collaboration
  source_vocabulary: problem-structures
domain:
  - id: engineering
    label: Engineering
    source_vocabulary: domains
  - id: finance
    label: Finance
    source_vocabulary: domains
  - id: compliance
    label: Compliance
    source_vocabulary: domains
  - id: operations
    label: Operations
    source_vocabulary: domains
  - id: research
    label: Research
