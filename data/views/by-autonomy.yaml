version: 1
view: by-autonomy
title: Browse by autonomy
summary: Derived alternate view that groups future canonical patterns by autonomy level and expected human
  control boundaries.
source_documents:
- docs/index-tree.md
source_vocabularies:
- autonomy-levels
source_fields:
- autonomy_profile.level
usage_notes:
- This is a derived browse artifact, not canonical pattern content.
- Within each bucket, keep patterns grouped by the shared family order from data/views/index-tree.yaml.
- Empty family buckets are intentional until canonical pattern entries are authored under data/patterns/.
population_rules:
  include_when:
  - canonical pattern autonomy_profile.level matches the referenced autonomy level id
  group_by:
  - pattern_family
  family_order_source: data/views/index-tree.yaml
  pattern_link_target: data/patterns/<pattern-id>.yaml
empty_state:
  status: partial-canonical-pattern-coverage
  note: Canonical patterns now populate this view. Empty family buckets indicate autonomy/family combinations
    that remain uncovered.
