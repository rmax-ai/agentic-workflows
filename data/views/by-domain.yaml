version: 1
view: by-domain
title: Browse by domain
summary: Derived alternate view that groups future canonical patterns under domain vocabulary terms while
  preserving family-first navigation.
source_documents:
- docs/index-tree.md
source_vocabularies:
- domains
source_fields:
- domain
usage_notes:
- This is a derived browse artifact, not canonical pattern content.
- Within each bucket, keep patterns grouped by the shared family order from data/views/index-tree.yaml.
- Empty family buckets are intentional until canonical pattern entries are authored under data/patterns/.
population_rules:
  include_when:
  - canonical pattern domain includes the referenced domain id
  group_by:
  - pattern_family
  family_order_source: data/views/index-tree.yaml
  pattern_link_target: data/patterns/<pattern-id>.yaml
empty_state:
  status: partial-canonical-pattern-coverage
  note: Canonical patterns now populate this view. Empty family buckets indicate domain/family combinations
    that remain uncovered.
