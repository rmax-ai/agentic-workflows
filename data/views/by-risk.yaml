version: 1
view: by-risk
title: Browse by risk
summary: Derived alternate view that groups future canonical patterns by risk level and governance posture.
source_documents:
- docs/index-tree.md
source_vocabularies:
- risk-levels
source_fields:
- risk_governance.level
usage_notes:
- This is a derived browse artifact, not canonical pattern content.
- Within each bucket, keep patterns grouped by the shared family order from data/views/index-tree.yaml.
- Empty family buckets are intentional until canonical pattern entries are authored under data/patterns/.
population_rules:
  include_when:
  - canonical pattern risk_governance.level matches the referenced risk level id
  group_by:
  - pattern_family
  family_order_source: data/views/index-tree.yaml
  pattern_link_target: data/patterns/<pattern-id>.yaml
empty_state:
  status: partial-canonical-pattern-coverage
  note: Canonical patterns now populate this view. Empty family buckets indicate risk/family combinations
    that remain uncovered.
risk_levels:
- risk_level:
    id: low
    label: Low
    source_vocabulary: risk-levels
  pattern_families:
    gather-retrieve-synthesize: [change-triggered-context-briefing]
    transform-process: [normalization-and-enrichment]
    investigate-reconcile-verify: [claimed-state-verification]
    monitor-detect-triage: [explainable-watchlist-maintenance]
    plan-coordinate-schedule: [calendar-conflict-coordination]
    recommend-decide-escalate: [control-requirement-attestation-recommendation]
    execute-automate: [workflow-hand-off-and-completion]
    optimize-adapt: [adaptive-threshold-calibration, adaptive-review-sampling-rate-tuning]
    human-agent-collaborative-work: [shared-workbench-orchestration]
- risk_level:
    id: moderate
    label: Moderate
    source_vocabulary: risk-levels
  pattern_families:
    gather-retrieve-synthesize: [research-synthesis-with-citation-verification]
    transform-process: [document-to-structured-data-handoff, change-triggered-representation-refresh]
    investigate-reconcile-verify: [authoritative-record-reconciliation]
    monitor-detect-triage: [anomaly-detection-review]
    plan-coordinate-schedule: [schedule-adjustment-and-replanning]
    recommend-decide-escalate: [delegated-authority-option-ranking, readiness-gate-disposition-recommendation]
    execute-automate: [exception-aware-task-execution]
    optimize-adapt: [queue-prioritization-optimization]
    human-agent-collaborative-work: [analyst-copilot-loop]
- risk_level:
    id: high
    label: High
    source_vocabulary: risk-levels
  pattern_families:
    gather-retrieve-synthesize: [approval-packet-generation]
    transform-process: [batch-content-transformation, approval-gated-transformation-release]
    investigate-reconcile-verify: [incident-root-cause-analysis, evidence-gated-verification-for-release]
    monitor-detect-triage: [risk-alert-triage, approval-gated-triage-dispatch]
    plan-coordinate-schedule: [authoritative-change-coordination-refresh]
    recommend-decide-escalate: [deal-desk-recommendation-support, policy-constrained-escalation-routing]
    execute-automate: [staged-change-execution-with-rollback-holds]
    optimize-adapt: [governed-optimization-bundle-retuning]
    human-agent-collaborative-work: [approval-centered-collaboration]
- risk_level:
    id: critical
    label: Critical
    source_vocabulary: risk-levels
  pattern_families:
    gather-retrieve-synthesize: [crisis-briefing-evidence-synthesis]
    transform-process: [critical-channel-safe-state-packaging]
    investigate-reconcile-verify: [critical-authoritative-state-restoration]
    monitor-detect-triage: [critical-signal-corroboration-triage]
    plan-coordinate-schedule: [contingency-plan-activation-gate, critical-command-window-resequencing]
    recommend-decide-escalate: [critical-escalation-authority-recommendation]
    execute-automate: [browser-based-form-completion-with-approval-gates, human-directed-task-orchestration]
    optimize-adapt: [critical-protected-priority-adaptation]
    human-agent-collaborative-work: [critical-protected-artifact-collaboration]
