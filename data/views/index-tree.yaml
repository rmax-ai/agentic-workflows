version: 1
view: index-tree
title: Pattern-first browse tree
summary: Derived primary browse view that anchors navigation on pattern families and reserves canonical
  pattern links for later phases.
root:
  id: patterns
  label: Patterns
  summary: The default browse root stays pattern-family-first, while alternate views remain derived aids.
source_documents:
- docs/index-tree.md
source_vocabularies:
- problem-structures
source_fields:
- pattern_family
usage_notes:
- This file is a derived browse artifact and should stay regenerable from canonical pattern data plus
  stable family ids.
- Use family ids as the primary navigation spine and add canonical pattern ids only after data/patterns/
  exists.
- Keep alternate views aligned to this family order so domain and governance navigation still reflects
  the pattern-first ontology.
- The transform-process family now maps to `structured-representation-transformation`; keep related links focused
  on representation change rather than downstream judgment or execution.
linkage:
  canonical_pattern_directory: data/patterns
  canonical_pattern_file_template: data/patterns/<pattern-id>.yaml
  alternate_views:
  - data/views/by-domain.yaml
  - data/views/by-architecture.yaml
  - data/views/by-autonomy.yaml
  - data/views/by-risk.yaml
empty_state:
  status: partial-canonical-pattern-coverage
  note: Canonical pattern YAML entries now exist. Empty pattern_ids lists indicate family areas that
    remain uncovered rather than a missing pattern layer.
